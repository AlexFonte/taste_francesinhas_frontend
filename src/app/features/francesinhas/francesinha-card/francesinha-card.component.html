<div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">

  <!-- Imagen -->
  <div class="relative bg-[#F1EFE8] aspect-video flex items-center justify-center">
    <span class="text-gray-300 text-4xl">🥪</span>
    <!-- Botón favorito -->
    <button class="absolute top-2 right-2 p-1.5 rounded-full bg-white/80 shadow">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
      </svg>
    </button>
  </div>

  <!-- Contenido -->
  <div class="p-3 flex flex-col gap-1.5">

    <!-- Nombre -->
    <h3 class="font-semibold text-gray-900 text-sm leading-tight line-clamp-1">
      {{ francesinha().name }}
    </h3>

    <!-- Restaurante -->
    <p class="text-xs text-gray-500 line-clamp-1">
      {{ francesinha().restaurant?.name }}
    </p>

    <!-- Score + ciudad + precio -->
    <div class="flex items-center gap-2 mt-0.5 flex-wrap">

      <!-- Score -->
      <div class="flex items-center gap-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
        </svg>
        <span class="text-xs font-medium text-gray-700">{{ francesinha().avgScore | number:'1.1-1' }}</span>
      </div>

      <!-- Ciudad -->
      <span class="text-xs bg-neutral text-gray-600 px-2 py-0.5 rounded-full">
        {{ francesinha().restaurant?.city }}
      </span>

      <!-- Precio -->
      <span class="text-xs bg-primary/10 text-primary font-medium px-2 py-0.5 rounded-full ml-auto">
        {{ francesinha().price | number:'1.2-2' }} €
      </span>

    </div>
  </div>
</div>

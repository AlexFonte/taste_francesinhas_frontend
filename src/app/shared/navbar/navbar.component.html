<!-- ===== HEADER DESKTOP ===== -->
<header class="bg-white shadow-sm px-4 py-3 flex items-center justify-between">
  <h1 class="text-lg font-bold text-primary md:text-xl">Taste Francesinhas</h1>

  <nav class="hidden md:flex items-center gap-1">
    @for (item of navItems(); track item.route) {
      <app-nav-item [item]="item" variant="desktop" />
    }
  </nav>
</header>

<!-- ===== BOTTOM NAV MÓVIL ===== -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-200 flex">
  @for (item of navItems(); track item.route) {
    <app-nav-item [item]="item" variant="mobile" />
  }
</nav>

<section class="flex flex-col items-center justify-center min-h-[60vh] px-6 py-12 text-center">

  <mat-icon class="!text-[96px] !w-24 !h-24 !leading-none text-secondary mb-6">sentiment_dissatisfied</mat-icon>

  <h1 class="font-serif text-6xl font-bold text-secondary mb-2">404</h1>
  <h2 class="font-sans text-2xl font-semibold text-gray-800 mb-4">Página no encontrada</h2>

  <p class="font-sans text-base text-gray-600 max-w-md mb-8">
    La página que buscas no existe o se ha movido. Comprueba la URL o vuelve al inicio.
  </p>

  <div class="flex flex-wrap items-center justify-center gap-3">
    <button mat-stroked-button (click)="back()">
      <mat-icon>arrow_back</mat-icon>
      Volver
    </button>
    <a mat-flat-button color="primary" routerLink="/francesinhas">
      <mat-icon>lunch_dining</mat-icon>
      Ir a francesinhas
    </a>
  </div>

</section>

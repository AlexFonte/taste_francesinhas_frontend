<a
	[attr.aria-disabled]="!item().enabled"
	[class]="linkClass()"
	[routerLinkActiveOptions]="{ exact: false }"
	[routerLinkActive]="item().enabled ? activeClass() : ''"
	[routerLink]="item().enabled ? item().route : null">
	<mat-icon [class]="iconClass()">{{ item().icon }}</mat-icon>
	{{ item().label }}
</a>
